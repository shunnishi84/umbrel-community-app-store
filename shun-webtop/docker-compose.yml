version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: shun-webtop_webtop_1
      APP_PORT: 3000

  webtop:
    build: .
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-UTC}
      - LC_ALL=${LC_ALL:-C.UTF-8}
      - USER_NAME=${USER_NAME:-user}
    volumes:
      - ./data:/config
    shm_size: "2gb"
    restart: on-failure
