<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpeedTest Monitor</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
  <header>
    <div class="header-left">
      <h1>🚀 SpeedTest Monitor</h1>
      <span id="machine-name-label" class="machine-name"></span>
    </div>
    <div class="header-right">
      <div class="last-updated">最終測定: <span id="last-updated">-</span></div>
      <button id="btn-measure" class="btn btn-primary" title="今すぐ計測">
        <span id="measure-icon">⚡</span> <span id="measure-label">今すぐ計測</span>
      </button>
      <button id="btn-post-x" class="btn btn-x" title="Xに投稿" style="display:none">𝕏 投稿</button>
      <button id="btn-settings" class="btn btn-icon" title="設定">⚙</button>
      <button id="btn-theme" class="btn btn-icon" title="テーマ切替">🌙</button>
    </div>
  </header>

  <main>
    <!-- Stat cards with avg/max/min -->
    <section class="cards">
      <div class="card card-download">
        <div class="label">Download</div>
        <div class="value"><span id="latest-download">-</span><span class="unit">Mbps</span></div>
        <div class="card-stats">
          <span><span class="stat-lbl">avg</span><b id="avg-download">-</b></span>
          <span><span class="stat-lbl">max</span><b id="max-download">-</b></span>
          <span><span class="stat-lbl">min</span><b id="min-download">-</b></span>
        </div>
      </div>
      <div class="card card-upload">
        <div class="label">Upload</div>
        <div class="value"><span id="latest-upload">-</span><span class="unit">Mbps</span></div>
        <div class="card-stats">
          <span><span class="stat-lbl">avg</span><b id="avg-upload">-</b></span>
          <span><span class="stat-lbl">max</span><b id="max-upload">-</b></span>
          <span><span class="stat-lbl">min</span><b id="min-upload">-</b></span>
        </div>
      </div>
      <div class="card card-ping">
        <div class="label">Ping</div>
        <div class="value"><span id="latest-ping">-</span><span class="unit">ms</span></div>
        <div class="card-stats">
          <span><span class="stat-lbl">avg</span><b id="avg-ping">-</b></span>
          <span><span class="stat-lbl">max</span><b id="max-ping">-</b></span>
          <span><span class="stat-lbl">min</span><b id="min-ping">-</b></span>
        </div>
      </div>
    </section>

    <!-- Filter controls -->
    <section class="controls">
      <div class="range-tabs" id="range-tabs">
        <button data-hours="6" class="active">6h</button>
        <button data-hours="24">24h</button>
        <button data-hours="168">7d</button>
        <button data-hours="744">31d</button>
      </div>
      <div class="date-filter">
        <input type="date" id="from-date" title="開始日" />
        <span class="date-sep">〜</span>
        <input type="date" id="to-date" title="終了日" />
        <button class="btn btn-sm" id="btn-apply-date">適用</button>
        <button class="btn btn-sm" id="btn-clear-date">クリア</button>
      </div>
      <button class="btn btn-sm btn-csv" id="btn-csv">⬇ CSV</button>
    </section>

    <!-- Chart -->
    <section class="chart-wrapper">
      <canvas id="speed-chart"></canvas>
    </section>

    <!-- Results table -->
    <section class="table-section">
      <div class="table-header">
        <h3>計測履歴</h3>
        <span class="result-count" id="result-count">0件</span>
      </div>
      <div class="table-wrapper">
        <table class="results-table">
          <thead>
            <tr>
              <th class="sortable" data-col="measured_at">日時<span class="sort-icon">↕</span></th>
              <th class="sortable" data-col="download_mbps">DL (Mbps)<span class="sort-icon">↕</span></th>
              <th class="sortable" data-col="upload_mbps">UL (Mbps)<span class="sort-icon">↕</span></th>
              <th class="sortable" data-col="ping_ms">Ping (ms)<span class="sort-icon">↕</span></th>
            </tr>
          </thead>
          <tbody id="results-tbody">
            <tr><td colspan="4" class="table-empty">データを読み込み中…</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Settings Modal -->
  <div id="modal-settings" class="modal" role="dialog" aria-modal="true" aria-label="設定">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>設定</h2>
        <button class="modal-close" id="btn-modal-close">✕</button>
      </div>
      <div class="modal-body">
        <section class="settings-section">
          <h3>マシン登録</h3>
          <div class="form-group">
            <label for="input-machine-name">マシン名</label>
            <input type="text" id="input-machine-name" placeholder="例: Home Server, Raspberry Pi" />
            <p class="form-hint">計測結果やXへの投稿に表示されます</p>
          </div>
        </section>

        <section class="settings-section">
          <h3>X (Twitter) API 設定</h3>
          <p class="form-hint">Twitter Developer Portal で取得したOAuth 1.0a認証情報を入力してください。フィールドを空白のままにすると変更されません。</p>
          <div class="form-group">
            <label for="input-x-api-key">API Key (Consumer Key)</label>
            <input type="password" id="input-x-api-key" placeholder="設定済みの場合は変更しない" />
          </div>
          <div class="form-group">
            <label for="input-x-api-secret">API Secret (Consumer Secret)</label>
            <input type="password" id="input-x-api-secret" placeholder="設定済みの場合は変更しない" />
          </div>
          <div class="form-group">
            <label for="input-x-access-token">Access Token</label>
            <input type="password" id="input-x-access-token" placeholder="設定済みの場合は変更しない" />
          </div>
          <div class="form-group">
            <label for="input-x-access-token-secret">Access Token Secret</label>
            <input type="password" id="input-x-access-token-secret" placeholder="設定済みの場合は変更しない" />
          </div>
        </section>
      </div>
      <div class="modal-footer">
        <span id="settings-status" class="settings-status"></span>
        <button class="btn btn-primary" id="btn-settings-save">保存</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
