services:
  app:
    image: ghcr.io/shunnishi84/shun-speedtest-graph:1.0.0
    restart: unless-stopped
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - "${APP_DATA_DIR}/data:/data"
    environment:
      - DATABASE_PATH=/data/speedtest.db
      - MEASUREMENT_INTERVAL_MINUTES=15
      - RETENTION_DAYS=31
