services:
  app_proxy:
    environment:
      APP_HOST: shun-speedtest-graph_app_1
      APP_PORT: 8000

  app:
    image: ghcr.io/shunnishi84/shun-speedtest-graph:1.0.1
    restart: unless-stopped
    volumes:
      - "${APP_DATA_DIR}/data:/data"
    environment:
      - DATABASE_PATH=/data/speedtest.db
      - MEASUREMENT_INTERVAL_MINUTES=15
      - RETENTION_DAYS=31
