releaseNotes: >-
  **v1.0.1**

  - 手動計測機能: ヘッダーの「今すぐ計測」ボタンから即時に速度計測を実行できます

  - マシン登録機能: 設定画面でマシン名を登録し、ヘッダーおよびX投稿に表示できます

  - X (Twitter) 投稿機能: 最新の計測結果をワンクリックでXに投稿できます（要API設定）

  - ダーク/ライトモード切替: ヘッダーのボタンでテーマを切り替えられます（設定はブラウザに保存）
